<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tryout Evaluator</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB5qoFoZy_fbXQngWWYg79mv3twMNJZysE",
    authDomain: "tryout-app-5cdc1.firebaseapp.com",
    projectId: "tryout-app-5cdc1",
    storageBucket: "tryout-app-5cdc1.firebasestorage.app",
    messagingSenderId: "851377690492",
    appId: "1:851377690492:web:da90235338b336e7c536f9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── State ────────────────────────────────────────────────────────────────
  // Scored skills (1-10)
  const SKILLS = ['Hitting Contact','Hitting Power','Infield','Outfield','Pitching','Arm Strength','Catching'];
  const SK      = ['hitContact','hitPower','infield','outfield','pitching','arm','catching'];

  // Weights for overall score (used proportionally — unscored skills are excluded)
  const WEIGHTS = {
    hitContact: 0.15,
    hitPower:   0.15,
    infield:    0.15,
    outfield:   0.15,
    pitching:   0.20,
    arm:        0.10,
    catching:   0.10,
  };

  // Raw measurement fields — values stored as arrays (multiple readings allowed)
  // scores[pid][cid][key] = [] array of number strings
  const MEAS_FIELDS = [
    { key: 'speed30',   label: 'Home to 1st (30 yd)',  unit: 'sec',  timer: true  },
    { key: 'speed60',   label: 'Home to 2nd (60 yd)',  unit: 'sec',  timer: true  },
    { key: 'pitchVelo', label: 'Fastball Velocity',    unit: 'mph',  timer: false },
    { key: 'popTime',   label: 'Catching Pop Time',    unit: 'sec',  timer: true  },
  ];

  // Timer state per measurement key
  const timerState = {};

  // Keypad state for manual entry
  let keypadState = { pid: null, key: null, buffer: '' };
  const PALETTE = ['#c8102e','#1565c0','#2e7d32','#6a1b9a','#e65100','#00695c','#bf360c'];

  const AGE_GROUPS = ['7U','8U','9U','10U','11U','12U','13U','14U','15U','16U','17U','18U'];

  function normalizeAge(raw) {
    if (!raw) return '';
    const n = raw.toString().replace(/[^0-9]/g,'');
    if (!n) return raw;
    const num = parseInt(n);
    if (num >= 7 && num <= 18) return num + 'U';
    return raw;
  }

  let coaches  = [];
  let players  = [];
  let scores   = {};   // scores[pid][cid][skillKey|'notes']
  let activeCoach   = null;
  let currentEvalPid = null;
  let saveTimer = null;
  let unsubscribers = [];

  // ── Firestore helpers ────────────────────────────────────────────────────
  async function loadAll() {
    showLoading(true);
    try {
      // Load coaches
      const cSnap = await getDocs(collection(db, 'coaches'));
      coaches = [];
      cSnap.forEach(d => coaches.push({ id: d.id, ...d.data() }));
      const expectedNames = ['Wes Borden','Nic Robinson','Jack Hall','Other'];
      const hasCorrectCoaches = coaches.length === 4 && expectedNames.every(n => coaches.some(c => c.name === n));

      if (!hasCorrectCoaches) {
        // Wipe existing coaches and re-seed with correct names
        for (const c of coaches) {
          try { await deleteDoc(doc(db, 'coaches', c.id)); } catch(e){}
        }
        coaches = [];
        const defaults = [
          { name: 'Wes Borden',   color: '#c8102e' },
          { name: 'Nic Robinson', color: '#1565c0' },
          { name: 'Jack Hall',    color: '#2e7d32' },
          { name: 'Other',        color: '#6a1b9a' },
        ];
        for (const c of defaults) {
          const id = 'c' + Date.now() + Math.random().toString(36).slice(-4);
          await setDoc(doc(db, 'coaches', id), c);
          coaches.push({ id, ...c });
        }
      }

      // Load players
      const pSnap = await getDocs(collection(db, 'players'));
      players = [];
      pSnap.forEach(d => players.push({ id: d.id, ...d.data() }));

      // Load scores
      const sSnap = await getDocs(collection(db, 'scores'));
      scores = {};
      sSnap.forEach(d => {
        const [pid, cid] = d.id.split('__');
        if (!scores[pid]) scores[pid] = {};
        scores[pid][cid] = d.data();
      });

      showLoading(false);
      renderLogin();
      startListeners();
    } catch (e) {
      console.error(e);
      document.getElementById('loading-msg').textContent = 'Connection error. Check your Firebase config.';
    }
  }

  function startListeners() {
    // Live scores listener — updates results in real time
    const unsub1 = onSnapshot(collection(db, 'scores'), snap => {
      snap.docChanges().forEach(change => {
        const [pid, cid] = change.doc.id.split('__');
        if (!scores[pid]) scores[pid] = {};
        if (change.type === 'removed') {
          delete scores[pid][cid];
        } else {
          scores[pid][cid] = change.doc.data();
        }
      });
      if (document.getElementById('tab-results').classList.contains('active')) {
        renderSummary(); renderResults();
      }
    });

    // Live players listener
    const unsub2 = onSnapshot(collection(db, 'players'), snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'removed') {
          players = players.filter(p => p.id !== change.doc.id);
        } else {
          const idx = players.findIndex(p => p.id === change.doc.id);
          const data = { id: change.doc.id, ...change.doc.data() };
          if (idx >= 0) players[idx] = data; else players.push(data);
        }
      });
      if (document.getElementById('tab-roster').classList.contains('active')) renderRoster();
      if (document.getElementById('tab-eval').classList.contains('active')) renderEvalPicker();
    });

    // Live coaches listener
    const unsub3 = onSnapshot(collection(db, 'coaches'), snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'removed') {
          coaches = coaches.filter(c => c.id !== change.doc.id);
        } else {
          const idx = coaches.findIndex(c => c.id === change.doc.id);
          const data = { id: change.doc.id, ...change.doc.data() };
          if (idx >= 0) coaches[idx] = data; else coaches.push(data);
        }
      });
    });

    unsubscribers = [unsub1, unsub2, unsub3];
  }

  async function saveScore(pid, cid) {
    const data = scores[pid] && scores[pid][cid] ? { ...scores[pid][cid] } : {};
    await setDoc(doc(db, 'scores', `${pid}__${cid}`), data);
    flashSave();
  }

  function scheduleSave(pid, cid) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => saveScore(pid, cid), 350);
  }

  function flashSave() {
    const el = document.getElementById('save-ind');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 1500);
  }

  function showLoading(on) {
    document.getElementById('screen-loading').style.display = on ? 'flex' : 'none';
    document.getElementById('screen-login').style.display = on ? 'none' : 'block';
  }

  function newId(prefix) {
    return prefix + Date.now().toString(36) + Math.random().toString(36).slice(-4);
  }

  // ── Login ────────────────────────────────────────────────────────────────
  function renderLogin() {
    document.getElementById('screen-login').style.display = 'block';
    document.getElementById('screen-main').style.display = 'none';
    const el = document.getElementById('coach-list');
    if (!coaches.length) { el.innerHTML = '<p class="empty">No coaches yet — add one below.</p>'; return; }
    el.innerHTML = coaches.map(c => {
      const ini = c.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      return `<button class="coach-btn" onclick="loginAs('${c.id}')">
        <div class="cavatar" style="background:${c.color}22;color:${c.color}">${ini}</div>
        <div>
          <div class="coach-btn-name">${c.name}</div>
          <div class="coach-btn-role">Tap to score</div>
        </div>
      </button>`;
    }).join('');
  }

  window.addCoach = async function() {
    const inp = document.getElementById('new-coach-input');
    const name = inp.value.trim(); if (!name) return;
    const id = newId('c');
    const color = PALETTE[coaches.length % PALETTE.length];
    await setDoc(doc(db, 'coaches', id), { name, color });
    // Don't push locally — onSnapshot listener handles it
    inp.value = '';
  };

  window.loginAs = function(id) {
    activeCoach = coaches.find(c => c.id === id);
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = 'block';
    document.getElementById('coach-label').textContent = activeCoach.name;
    document.getElementById('coach-dot').style.background = activeCoach.color;
    document.getElementById('hdr-sub').textContent = 'Scoring as ' + activeCoach.name;
    gotoTab('roster');
  };

  window.switchCoach = function() {
    activeCoach = null;
    renderLogin();
  };

  // ── Roster ───────────────────────────────────────────────────────────────
  window.toggleAddForm = function() {
    const f = document.getElementById('add-form');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  };

  let addPhotoBase64 = null;
  let editPhotoBase64 = null;

  window.previewEditPhoto = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      editPhotoBase64 = ev.target.result;
      const prev = document.getElementById('edit-photo-preview');
      if (prev) prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
    };
    reader.readAsDataURL(file);
  };

  window.previewAddPhoto = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      addPhotoBase64 = ev.target.result;
      const prev = document.getElementById('add-photo-preview');
      if (prev) prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
    };
    reader.readAsDataURL(file);
  };

  window.addPlayer = async function() {
    const first = document.getElementById('ff').value.trim();
    const last  = document.getElementById('fl').value.trim();
    if (!first || !last) { alert('First and last name required'); return; }
    const id = newId('p');
    const data = {
      first, last,
      age:   normalizeAge(document.getElementById('fa').value.trim()),
      num:   document.getElementById('fg2').value.trim(),
      pos:   document.getElementById('fp').value,
      pos2:  document.getElementById('fp2').value,
      photo: addPhotoBase64 || '',
      group: '',
      notes: '',
      createdAt: Date.now()
    };
    await setDoc(doc(db, 'players', id), data);
    // Don't push locally — onSnapshot listener will add it and re-render
    ['ff','fl','fa','fn','fg2'].forEach(x => { const el=document.getElementById(x); if(el) el.value=''; });
    document.getElementById('fp').value = '';
    document.getElementById('fp2').value = '';
    addPhotoBase64 = null;
    const prev = document.getElementById('add-photo-preview');
    if (prev) prev.innerHTML = '📷';
    toggleAddForm();
  };

  window.removePlayer = async function(id) {
    if (!confirm('Remove this player and all their scores?')) return;
    await deleteDoc(doc(db, 'players', id));
    // Remove all score docs for this player
    for (const c of coaches) {
      try { await deleteDoc(doc(db, 'scores', `${id}__${c.id}`)); } catch(e){}
    }
    players = players.filter(p => p.id !== id);
    delete scores[id];
    renderRoster();
  };

  window.openEditPlayer = function(pid) {
    const p = players.find(x => x.id === pid);
    if (!p) return;
    editPhotoBase64 = null;
    const posOpts = ['','Pitcher','Catcher','1B','2B','3B','SS','LF','CF','RF','Utility','Unknown'];
    const selOpt = (val) => posOpts.map(o => `<option value="${o}" ${o===val?'selected':''}>${o||'Select...'}</option>`).join('');
    document.getElementById('edit-modal-body').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:16px;font-weight:600;color:var(--txt)">Edit Player</div>
        <button class="btn sm del" onclick="closeEditModal()" style="font-size:16px;padding:2px 8px">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div id="edit-photo-preview" style="width:72px;height:72px;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--bdr2);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:28px" onclick="document.getElementById('edit-photo-inp').click()">
          ${p.photo ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover">` : '📷'}
        </div>
        <div style="font-size:12px;color:var(--txt2)">Tap photo to change</div>
        <input type="file" id="edit-photo-inp" accept="image/*" capture="environment" style="display:none" onchange="previewEditPhoto(event)">
      </div>
      <div class="frow c4" style="margin-bottom:8px">
        <div class="fg"><label>First name</label><input id="ef-first" type="text" value="${p.first}"></div>
        <div class="fg"><label>Last name</label><input id="ef-last" type="text" value="${p.last}"></div>
        <div class="fg"><label>Age group</label>
          <select id="ef-age" style="width:100%;padding:6px 8px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
            <option value="">Select...</option>
            ${ ['7U','8U','9U','10U','11U','12U','13U','14U','15U','16U','17U','18U'].map(a=>'<option value="'+a+'"'+(normalizeAge(p.age||'')===a?' selected':'')+'>'+a+'</option>').join('') }
          </select>
        </div>
        <div class="fg"><label>Tryout #</label><input id="ef-num" type="text" value="${p.num||''}"></div>
      </div>
      <div class="frow c4" style="margin-bottom:16px">
        <div class="fg"><label>Primary position</label><select id="ef-pos">${selOpt(p.pos||'')}</select></div>
        <div class="fg"><label>Secondary position</label><select id="ef-pos2">${selOpt(p.pos2||'')}</select></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="closeEditModal()">Cancel</button>
        <button class="btn pri" onclick="saveEditPlayer('${pid}')">Save changes</button>
      </div>`;
    document.getElementById('edit-modal-overlay').style.display = 'flex';
  };

  window.closeEditModal = function() {
    document.getElementById('edit-modal-overlay').style.display = 'none';
  };

  window.saveEditPlayer = async function(pid) {
    const p = players.find(x => x.id === pid);
    if (!p) return;
    const first = document.getElementById('ef-first').value.trim();
    const last  = document.getElementById('ef-last').value.trim();
    if (!first || !last) { alert('Name required'); return; }
    const updates = {
      first, last,
      age:  normalizeAge(document.getElementById('ef-age').value.trim()),
      num:  document.getElementById('ef-num').value.trim(),
      pos:  document.getElementById('ef-pos').value,
      pos2: document.getElementById('ef-pos2').value,
      photo: editPhotoBase64 !== null ? editPhotoBase64 : (p.photo || ''),
    };
    Object.assign(p, updates);
    await setDoc(doc(db, 'players', pid), { ...p });
    closeEditModal();
    renderRoster();
    flashSave();
  };

  window.importCSV = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const lines = ev.target.result.trim().split('\n');
      if (lines.length < 2) { alert('Empty CSV'); return; }
      const hdrs = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
      const get = (row, aliases) => { for (const a of aliases) { const i = hdrs.indexOf(a); if (i >= 0 && row[i]) return row[i].trim(); } return ''; };
      let n = 0;
      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',');
        let first = get(row, ['first','firstname','fname']);
        let last  = get(row, ['last','lastname','lname']);
        const full = get(row, ['name','playername','fullname']);
        if (!first && !last && full) { const p = full.split(' '); first = p[0]; last = p.slice(1).join(' '); }
        if (!first || !last) continue;
        const id = newId('p');
        const data = {
          first, last,
          age:   normalizeAge(get(row, ['age','gradyear','grad'])),
          num:   get(row, ['number','num','jersey','jerseynumber']),
          pos:   get(row, ['position','pos']),
          group: get(row, ['group','team','division']),
          notes: get(row, ['notes','comments']),
          createdAt: Date.now()
        };
        await setDoc(doc(db, 'players', id), data);
        n++;
      }
      e.target.value = '';
      alert(`Imported ${n} player${n !== 1 ? 's' : ''}. Roster will update shortly.`);
    };
    reader.readAsText(file);
  };

  function populateAgeDropdown(selectId) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const current = sel.value;
    const ages = [...new Set(players.map(p => p.age).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All ages</option>' + ages.map(a => `<option value="${a}" ${a===current?'selected':''}>${a}</option>`).join('');
  }

  function applyListFiltersAndSort(players, searchId, ageId, sortId) {
    const q = (document.getElementById(searchId)?.value || '').toLowerCase();
    const age = document.getElementById(ageId)?.value || '';
    const sort = document.getElementById(sortId)?.value || 'name';
    let list = players.filter(p => {
      const matchQ = `${p.first} ${p.last} ${p.num} ${p.pos}`.toLowerCase().includes(q);
      const matchAge = !age || p.age === age;
      return matchQ && matchAge;
    });
    if (sort === 'tryout') list.sort((a,b) => (parseInt(a.num)||999) - (parseInt(b.num)||999));
    else if (sort === 'age') list.sort((a,b) => (a.age||'').localeCompare(b.age||''));
    else list.sort((a,b) => `${a.last}${a.first}`.localeCompare(`${b.last}${b.first}`));
    return list;
  }

  function renderRoster() {
    populateAgeDropdown('r-age');
    const el = document.getElementById('roster-list');
    const list = applyListFiltersAndSort(players, 'r-srch', 'r-age', 'r-sort');
    if (!list.length) { el.innerHTML = '<p class="empty">No players match. Try clearing the filters.</p>'; return; }
    el.innerHTML = list.map(p => {
      const myScored = activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]);
      const coachCount = coaches.filter(c => scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k])).length;
      const posDisplay = [p.pos, p.pos2].filter(Boolean).join(' / ');
      const photoHtml = p.photo
        ? `<img src="${p.photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:0.5px solid var(--bdr);flex-shrink:0">`
        : `<div style="width:36px;height:36px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${p.first[0]}${p.last[0]}</div>`;
      return `<div class="prow" style="cursor:pointer;grid-template-columns:36px 36px 1fr auto auto auto" onclick="openEditPlayer('${p.id}')">
        <div class="pnum">${p.num || '—'}</div>
        ${photoHtml}
        <div>
          <div class="pname">${p.first} ${p.last}</div>
          <div class="pmeta">${posDisplay || '—'} · ${p.age || '—'}</div>
        </div>
        <div class="pbadges">
          ${myScored ? '<span class="badge bgn">Scored by me</span>' : '<span class="badge bgr">Pending</span>'}
          ${coachCount ? `<span class="badge bbl">${coachCount}/${coaches.length} coaches</span>` : ''}
        </div>
        <div class="pavg">${aggAvg(p.id)}</div>
        <div class="pactions">
          <button class="btn sm del" onclick="event.stopPropagation();removePlayer('${p.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Eval picker ──────────────────────────────────────────────────────────
  function renderEvalPicker() {
    populateAgeDropdown('ep-age');
    const filter = document.getElementById('ep-filter').value;
    const el     = document.getElementById('eval-list');
    let list = applyListFiltersAndSort(players, 'ep-srch', 'ep-age', 'ep-sort');
    if (filter === 'pending') list = list.filter(p => !activeCoach || !scores[p.id] || !scores[p.id][activeCoach.id] || !SK.some(k => scores[p.id][activeCoach.id][k]));
    if (filter === 'done')    list = list.filter(p => activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]));
    if (!list.length) { el.innerHTML = '<p class="empty">No players match.</p>'; return; }
    el.innerHTML = list.map(p => {
      const myScored = activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]);
      return `<div class="prow">
        <div class="pnum">${p.num || '—'}</div>
        <div><div class="pname">${p.first} ${p.last}</div><div class="pmeta">${p.pos || '—'}</div></div>
        <div>${myScored ? '<span class="badge bgn">Scored</span>' : '<span class="badge bgr">Pending</span>'}</div>
        <div class="pavg">${aggAvg(p.id)}</div>
        <div><button class="btn pri sm" onclick="openEval('${p.id}')">Score →</button></div>
      </div>`;
    }).join('');
  }

  window.openEval = function(pid) {
    currentEvalPid = pid;
    document.getElementById('eval-picker').style.display = 'none';
    document.getElementById('eval-form-wrap').style.display = 'block';
    document.getElementById('eval-sidebar').style.display = 'block';
    renderSidebar();
    renderEvalForm();
  };

  function renderSidebar() {
    const ageFilter = document.getElementById('ep-age')?.value || '';
    const sidebar = document.getElementById('sidebar-list');
    const label = document.getElementById('sidebar-age-label');
    if (label) label.textContent = ageFilter ? ageFilter + ' Players' : 'All Players';
    let list = ageFilter ? players.filter(p => p.age === ageFilter) : players;
    list = [...list].sort((a,b) => (parseInt(a.num)||999)-(parseInt(b.num)||999));
    if (!sidebar) return;
    sidebar.innerHTML = list.map(p => {
      const isCurrent = p.id === currentEvalPid;
      const myScored = activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]);
      return `<div onclick="openEval('${p.id}')" style="padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--bdr);background:${isCurrent?'var(--red)':'var(--bg)'};transition:background .1s">
        <div style="font-size:13px;font-weight:600;color:${isCurrent?'#fff':'var(--txt)'}">#${p.num||'—'} ${p.first} ${p.last}</div>
        <div style="font-size:11px;color:${isCurrent?'rgba(255,255,255,0.8)':'var(--txt2)'};">${p.pos||'—'} ${myScored?'✓':''}</div>
      </div>`;
    }).join('');
    // Scroll active player into view
    const active = sidebar.querySelector(`div[style*="var(--red)"]`);
    if (active) active.scrollIntoView({block:'nearest'});
  }

  window.closeEval = function() {
    document.getElementById('eval-picker').style.display = 'block';
    document.getElementById('eval-form-wrap').style.display = 'none';
    document.getElementById('eval-sidebar').style.display = 'none';
    renderEvalPicker();
  };

  // ── Eval form ────────────────────────────────────────────────────────────
  function myWeightedAvg(cs) {
    let wsum = 0, wused = 0;
    SK.forEach(k => {
      const v = cs[k];
      if (!v) return; // skip unscored
      const w = WEIGHTS[k] || (1/SK.length);
      wsum += v * w; wused += w;
    });
    // Re-normalize by wused so unscored skills don't drag score down
    return wused ? (wsum / wused).toFixed(1) : '—';
  }

  function renderEvalForm() {
    const p = players.find(x => x.id === currentEvalPid);
    if (!p || !activeCoach) return;
    if (!scores[p.id]) scores[p.id] = {};
    if (!scores[p.id][activeCoach.id]) scores[p.id][activeCoach.id] = {};
    const cs = scores[p.id][activeCoach.id];
    const idx = players.indexOf(p);

    const scoreRow = (key, label) => {
      const val = cs[key] || 0;
      const btns = Array.from({length:10}, (_,i) =>
        `<button class="sc${val > i ? ' on' : ''}" onclick="setScore('${p.id}','${key}',${i+1})">${i+1}</button>`
      ).join('');
      return `<div class="skill-item">
        <div class="slbl">${label} <span class="sval" id="sv-${key}">${val ? val+'/10' : '—'}</span></div>
        <div class="strack">${btns}</div>
      </div>`;
    };

    const measRow = (m) => {
      const readings = getMeasReadings(p.id, m.key);
      const nums = readings.map(r => parseFloat(r)).filter(n => !isNaN(n));
      const avg = nums.length ? (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2) : null;
      const readingsList = readings.length ? readings.map((r,i) =>
        `<div class="mread-row"><span class="mread-val">${parseFloat(r).toFixed(2)}</span><button class="mread-del" onclick="deleteMeasReading('${p.id}','${m.key}',${i})">✕</button></div>`
      ).join('') : '<span style="font-size:12px;color:var(--txt3)">No readings yet</span>';
      const avgText = nums.length ? `Avg: ${avg} (${nums.length} reading${nums.length>1?'s':''})` : '';

      if (m.timer) {
        const ts = timerState[m.key] || {};
        const isRunning = ts.running || false;
        return `<div class="meas-item">
          <div class="slbl">${m.label} <span style="font-size:11px;color:var(--txt3)">${m.unit}</span></div>
          <div class="timer-display" id="td-${m.key}">0.00s</div>
          <div class="timer-btns">
            <button class="timer-btn ${isRunning?'timer-stop':'timer-start'}" id="tb-${m.key}" onclick="timerToggle('${p.id}','${m.key}')">${isRunning?'⏹ Stop':'▶ Start'}</button>
          </div>
          <div id="mrl-${m.key}" class="mread-list">${readingsList}</div>
          <div id="mra-${m.key}" class="mread-avg">${avgText}</div>
        </div>`;
      }
      return `<div class="meas-item">
        <div class="slbl">${m.label} <span style="font-size:11px;color:var(--txt3)">${m.unit}</span></div>
        <button class="timer-btn timer-start" style="margin-bottom:6px" onclick="openKeypad('${p.id}','${m.key}','${m.label}')">+ Add reading</button>
        <div id="mrl-${m.key}" class="mread-list">${readingsList}</div>
        <div id="mra-${m.key}" class="mread-avg">${avgText}</div>
      </div>`;
    };

    const others = coaches.filter(c => c.id !== activeCoach.id && scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k]));
    const othersHTML = others.length ? `
      <hr class="divider">
      <div class="other-title">Other coaches' scores</div>
      ${others.map(c => {
        const sc = scores[p.id][c.id];
        const cavg = myWeightedAvg(sc);
        const pills = SK.map((k,i) => sc[k] ? `<span class="cpill" style="background:${c.color}18;color:${c.color}">${SKILLS[i].split(' ')[0]}: ${sc[k]}</span>` : '').filter(Boolean).join('');
        const measPills = MEAS_FIELDS.map(m => sc[m.key] ? `<span class="cpill" style="background:#88888818;color:var(--txt2)">${m.label.split(' ')[0]}: ${sc[m.key]}${m.unit}</span>` : '').filter(Boolean).join('');
        return `<div class="other-row">
          <span class="other-name" style="color:${c.color}">${c.name} <span class="other-avg">(${cavg})</span></span>
          <div class="other-pills">${pills}${measPills}</div>
        </div>`;
      }).join('')}` : '';

    document.getElementById('eval-form-wrap').innerHTML = `
      <div class="eval-card">
        <div class="eval-hdr">
          <div>
            <div style="display:flex;align-items:center;gap:10px">
          ${p.photo ? `<img src="${p.photo}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:0.5px solid var(--bdr)">` : `<div style="width:48px;height:48px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--txt2)">${p.first[0]}${p.last[0]}</div>`}
          <div class="eval-pname">${p.first} ${p.last}</div>
        </div>
            <div class="eval-meta">Tryout #${p.num||'—'} · ${p.pos||'—'} · ${p.age||'—'}</div>
            <div class="eval-coach-lbl" style="color:${activeCoach.color}">Scoring as ${activeCoach.name}</div>
          </div>
          <div class="eval-avg-block">
            <div class="eval-avg-num" id="my-avg">${myWeightedAvg(cs)}</div>
            <div class="eval-avg-sub">my weighted score</div>
            <div class="eval-avg-sub" style="margin-top:2px">all coaches: ${aggAvg(p.id)}</div>
          </div>
        </div>

        <div style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Skill Scores</div>
        <div class="skill-grid">
          ${SK.map((k,i) => scoreRow(k, SKILLS[i])).join('')}
        </div>

        <hr class="divider">
        <div style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Measurements</div>
        <div class="meas-grid">
          ${MEAS_FIELDS.map(m => measRow(m)).join('')}
        </div>

        <hr class="divider">
        <div class="notes-wrap">
          <label class="notes-lbl">My notes for ${p.first}</label>
          <textarea id="my-notes" class="notes-ta" onchange="saveNotesNow('${p.id}')" onblur="saveNotesNow('${p.id}')" placeholder="Mechanics, attitude, standout moments...">${cs.notes || ''}</textarea>
        </div>
        ${othersHTML}
        <div class="eval-nav">
          <button class="btn" onclick="closeEval()">← Back</button>
          <div class="eval-nav-r">
            <span class="eval-prog">${idx+1} of ${players.length}</span>
            ${idx < players.length-1 ? `<button class="btn pri" onclick="nextPlayer()">Next →</button>` : ''}
          </div>
        </div>
      </div>`;
  }

  window.setScore = function(pid, key, val) {
    if (!activeCoach) return;
    if (!scores[pid]) scores[pid] = {};
    if (!scores[pid][activeCoach.id]) scores[pid][activeCoach.id] = {};

    // Toggle off if same button clicked again
    const current = scores[pid][activeCoach.id][key];
    const newVal = (current === val) ? null : val;
    scores[pid][activeCoach.id][key] = newVal;

    // Update buttons
    const kidx = SK.indexOf(key);
    const allTracks = document.querySelectorAll('.strack');
    if (allTracks[kidx]) {
      allTracks[kidx].querySelectorAll('.sc').forEach((sc,i) => {
        sc.classList.toggle('on', newVal && i < newVal);
      });
    }
    const svEl = document.getElementById('sv-' + key);
    if (svEl) svEl.textContent = newVal ? newVal + '/10' : '—';

    // Update my weighted avg display
    const cs = scores[pid][activeCoach.id];
    const avgEl = document.getElementById('my-avg');
    if (avgEl) avgEl.textContent = myWeightedAvg(cs);

    scheduleSave(pid, activeCoach.id);
    if (document.getElementById('eval-sidebar').style.display !== 'none') renderSidebar();
  };

  window.setMeas = function(pid, key, val) {
    if (!activeCoach) return;
    if (!scores[pid]) scores[pid] = {};
    if (!scores[pid][activeCoach.id]) scores[pid][activeCoach.id] = {};
    scores[pid][activeCoach.id][key] = val;
    scheduleSave(pid, activeCoach.id);
  };

  // ── Timer + multi-reading system ─────────────────────────────────────────
  let timerRAF = {};

  function getMeasReadings(pid, key) {
    if (!activeCoach || !scores[pid] || !scores[pid][activeCoach.id]) return [];
    const val = scores[pid][activeCoach.id][key];
    if (!val) return [];
    if (Array.isArray(val)) return val;
    if (typeof val === 'string' && val !== '') return [val]; // legacy single
    return [];
  }

  function saveMeasReadings(pid, key, readings) {
    if (!activeCoach) return;
    if (!scores[pid]) scores[pid] = {};
    if (!scores[pid][activeCoach.id]) scores[pid][activeCoach.id] = {};
    scores[pid][activeCoach.id][key] = readings;
    scheduleSave(pid, activeCoach.id);
  }

  function refreshMeasUI(pid, key) {
    const readings = getMeasReadings(pid, key);
    const listEl = document.getElementById('mrl-' + key);
    const avgEl  = document.getElementById('mra-' + key);
    if (listEl) {
      listEl.innerHTML = readings.length ? readings.map((r,i) =>
        `<div class="mread-row">
          <span class="mread-val">${parseFloat(r).toFixed(2)}</span>
          <button class="mread-del" onclick="deleteMeasReading('${pid}','${key}',${i})">✕</button>
        </div>`
      ).join('') : '<span style="font-size:12px;color:var(--txt3)">No readings yet</span>';
    }
    if (avgEl) {
      if (readings.length) {
        const nums = readings.map(r => parseFloat(r)).filter(n => !isNaN(n));
        const avg = nums.length ? (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2) : '—';
        avgEl.textContent = `Avg: ${avg} (${readings.length} reading${readings.length>1?'s':''})`;
      } else {
        avgEl.textContent = '';
      }
    }
  }

  window.deleteMeasReading = function(pid, key, idx) {
    const readings = [...getMeasReadings(pid, key)];
    readings.splice(idx, 1);
    saveMeasReadings(pid, key, readings);
    refreshMeasUI(pid, key);
  };

  window.timerToggle = function(pid, key) {
    if (!timerState[key]) timerState[key] = { running: false, start: null };
    const ts = timerState[key];
    if (ts.running) {
      const elapsed = Date.now() - ts.start;
      ts.running = false;
      cancelAnimationFrame(timerRAF[key]);
      const secs = (elapsed / 1000).toFixed(2);
      const readings = [...getMeasReadings(pid, key), secs];
      saveMeasReadings(pid, key, readings);
      const disp = document.getElementById('td-' + key);
      if (disp) disp.textContent = secs + 's';
      const btn = document.getElementById('tb-' + key);
      if (btn) { btn.textContent = '▶ Start'; btn.className = 'timer-btn timer-start'; }
      refreshMeasUI(pid, key);
    } else {
      ts.start = Date.now();
      ts.running = true;
      const btn = document.getElementById('tb-' + key);
      if (btn) { btn.textContent = '⏹ Stop'; btn.className = 'timer-btn timer-stop'; }
      const disp = document.getElementById('td-' + key);
      if (disp) disp.textContent = '0.00s';
      function tick() {
        if (!timerState[key]?.running) return;
        const el = Date.now() - timerState[key].start;
        const d = document.getElementById('td-' + key);
        if (d) d.textContent = (el/1000).toFixed(2) + 's';
        timerRAF[key] = requestAnimationFrame(tick);
      }
      timerRAF[key] = requestAnimationFrame(tick);
    }
  };

  window.timerReset = function(pid, key) {
    cancelAnimationFrame(timerRAF[key]);
    timerState[key] = { running: false, start: null };
    const disp = document.getElementById('td-' + key);
    if (disp) disp.textContent = '0.00s';
    const btn = document.getElementById('tb-' + key);
    if (btn) { btn.textContent = '▶ Start'; btn.className = 'timer-btn timer-start'; }
  };

  // ── Keypad ────────────────────────────────────────────────────────────────
  window.openKeypad = function(pid, key, label) {
    keypadState = { pid, key, buffer: '' };
    document.getElementById('kp-title').textContent = label;
    document.getElementById('kp-display').textContent = '0';
    document.getElementById('kp-overlay').style.display = 'flex';
  };

  window.closeKeypad = function() {
    document.getElementById('kp-overlay').style.display = 'none';
    keypadState = { pid: null, key: null, buffer: '' };
  };

  window.kpPress = function(ch) {
    if (ch === '.' && keypadState.buffer.includes('.')) return;
    if (keypadState.buffer === '0' && ch !== '.') keypadState.buffer = ch;
    else keypadState.buffer += ch;
    if (keypadState.buffer === '') keypadState.buffer = '0';
    document.getElementById('kp-display').textContent = keypadState.buffer || '0';
  };

  window.kpBackspace = function() {
    keypadState.buffer = keypadState.buffer.slice(0,-1);
    document.getElementById('kp-display').textContent = keypadState.buffer || '0';
  };

  window.kpConfirm = function() {
    const val = parseFloat(keypadState.buffer);
    if (isNaN(val) || val <= 0) { alert('Enter a valid number'); return; }
    const { pid, key } = keypadState;
    const readings = [...getMeasReadings(pid, key), val.toFixed(2)];
    saveMeasReadings(pid, key, readings);
    refreshMeasUI(pid, key);
    closeKeypad();
  };

  window.saveNotesNow = function(pid) {
    if (!activeCoach) return;
    if (!scores[pid]) scores[pid] = {};
    if (!scores[pid][activeCoach.id]) scores[pid][activeCoach.id] = {};
    const nt = document.getElementById('my-notes');
    if (nt) scores[pid][activeCoach.id].notes = nt.value;
    saveScore(pid, activeCoach.id);
  };

  window.nextPlayer = function() {
    const idx = players.findIndex(x => x.id === currentEvalPid);
    if (idx < players.length-1) { currentEvalPid = players[idx+1].id; renderSidebar(); renderEvalForm(); }
  };

  // ── Aggregation ──────────────────────────────────────────────────────────
  function aggAvg(pid) {
    // Only include skills that have been scored; re-normalize weights to sum to 1
    let weightedSum = 0, weightUsed = 0;
    SK.forEach(k => {
      const vals = coaches.map(c => scores[pid] && scores[pid][c.id] ? scores[pid][c.id][k] : null).filter(v => v);
      if (!vals.length) return; // skip unscored skills entirely
      const avg = vals.reduce((a,b) => a+b,0) / vals.length;
      const w = WEIGHTS[k] || (1/SK.length);
      weightedSum += avg * w;
      weightUsed += w;
    });
    if (!weightUsed) return '—';
    // Divide by weightUsed (not 1.0) so partial scoring still produces a fair number
    return (weightedSum / weightUsed).toFixed(1);
  }

  function skillAgg(pid, key) {
    const vals = coaches.map(c => scores[pid] && scores[pid][c.id] ? scores[pid][c.id][key] : null).filter(v => v);
    if (!vals.length) return null;
    return (vals.reduce((a,b) => a+b,0) / vals.length).toFixed(1);
  }

  function coachAvg(pid, cid) {
    if (!scores[pid] || !scores[pid][cid]) return null;
    const cs = scores[pid][cid];
    // Use weighted avg, skipping unscored skills (same logic as aggAvg)
    let wsum = 0, wused = 0;
    SK.forEach(k => {
      const v = cs[k];
      if (!v) return;
      const w = WEIGHTS[k] || (1/SK.length);
      wsum += v * w; wused += w;
    });
    return wused ? (wsum / wused).toFixed(1) : null;
  }

  // ── Results ──────────────────────────────────────────────────────────────
  function renderSummary() {
    const evaled = players.filter(p => coaches.some(c => scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k]))).length;
    const avgs = players.map(p => parseFloat(aggAvg(p.id)) || 0).filter(v => v > 0);
    const overall = avgs.length ? (avgs.reduce((a,b) => a+b,0)/avgs.length).toFixed(1) : '—';
    const activeC = coaches.filter(c => players.some(p => scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k]))).length;
    document.getElementById('sum-stats').innerHTML = `
      <div class="stat"><div class="stat-val">${players.length}</div><div class="stat-lbl">Total players</div></div>
      <div class="stat"><div class="stat-val">${evaled}</div><div class="stat-lbl">Evaluated</div></div>
      <div class="stat"><div class="stat-val">${activeC}</div><div class="stat-lbl">Coaches active</div></div>
      <div class="stat"><div class="stat-val">${overall}</div><div class="stat-lbl">Overall avg</div></div>`;
  }

  function renderResults() {
    renderSummary();
    populateAgeDropdown('res-age');
    const q    = (document.getElementById('res-srch').value || '').toLowerCase();
    const pos  = document.getElementById('res-pos').value;
    const age  = document.getElementById('res-age').value;
    const sort = document.getElementById('res-sort').value;
    let list = players.filter(p =>
      `${p.first} ${p.last} ${p.num} ${p.pos}`.toLowerCase().includes(q) &&
      (!pos || p.pos === pos || p.pos2 === pos) &&
      (!age || p.age === age)
    );
    if (sort === 'avg')    list.sort((a,b) => (parseFloat(aggAvg(b.id))||0) - (parseFloat(aggAvg(a.id))||0));
    else if (sort === 'name')   list.sort((a,b) => `${a.last}${a.first}`.localeCompare(`${b.last}${b.first}`));
    else if (sort === 'tryout') list.sort((a,b) => (parseInt(a.num)||999) - (parseInt(b.num)||999));
    else if (sort === 'age')    list.sort((a,b) => (a.age||'').localeCompare(b.age||''));

    const _mh = { speed30: '30yd', speed60: '60yd', pitchVelo: 'Velo', popTime: 'Pop' };
    document.getElementById('res-head').innerHTML = `<tr>
      <th>#</th><th>Name</th><th>Pos</th><th>Age Grp</th>
      ${SKILLS.map((s,i) => `<th title="${s}">${s.split(' ').map(w=>w[0]).join('')}</th>`).join('')}
      <th>Overall</th>
      ${MEAS_FIELDS.map(m => `<th title="${m.label}">${_mh[m.key]||m.key}</th>`).join('')}
      ${coaches.map(c => `<th style="color:${c.color}">${c.name.split(' ')[0]}</th>`).join('')}
      <th>Notes</th>
    </tr>`;

    const body = document.getElementById('res-body');
    if (!list.length) { body.innerHTML = '<tr><td colspan="20" class="empty-td">No results.</td></tr>'; return; }

    body.innerHTML = list.map(p => {
      const avg  = aggAvg(p.id);
      const avgN = parseFloat(avg) || 0;
      const pc   = avg === '—' ? 'bgr' : avgN >= 7.5 ? 'bgn' : avgN >= 5 ? 'bam' : 'brd';

      const skillCells = SK.map(key => {
        const agg = skillAgg(p.id, key);
        if (!agg) return '<td class="dim">—</td>';
        const n = parseFloat(agg);
        const bg = n>=7.5?'#e8f5e9':n>=5?'#fff8e1':'#fce4ec';
        const tc = n>=7.5?'#2e7d32':n>=5?'#f57f17':'#c62828';
        const perCoach = coaches.map(c => {
          const v = scores[p.id] && scores[p.id][c.id] ? scores[p.id][c.id][key] : null;
          return v ? `<span style="color:${c.color};font-size:10px">${v}</span>` : null;
        }).filter(Boolean).join('<span style="color:#aaa;font-size:9px">/</span>');
        return `<td>
          <span class="spill" style="background:${bg};color:${tc}">${agg}</span>
          ${coaches.length > 1 ? `<div class="per-coach">${perCoach}</div>` : ''}
        </td>`;
      }).join('');

      const coachCells = coaches.map(c => {
        const v = coachAvg(p.id, c.id);
        return `<td style="font-size:12px;color:${v ? c.color : '#999'};font-weight:${v?'500':'400'}">${v||'—'}</td>`;
      }).join('');

      const measCells = MEAS_FIELDS.map(m => {
        // Collect all readings from all coaches (array or legacy single)
        const allNums = [];
        coaches.forEach(c => {
          if (!scores[p.id] || !scores[p.id][c.id]) return;
          const raw = scores[p.id][c.id][m.key];
          if (!raw) return;
          const arr = Array.isArray(raw) ? raw : [raw];
          arr.forEach(r => { const n = parseFloat(r); if (!isNaN(n) && n > 0) allNums.push(n); });
        });
        const avg = allNums.length ? (allNums.reduce((a,b)=>a+b,0)/allNums.length).toFixed(2) : '—';
        return `<td style="font-size:12px;color:var(--txt)">${avg}</td>`;
      }).join('');

      const notes = coaches.map(c => {
        const n = scores[p.id] && scores[p.id][c.id] ? scores[p.id][c.id].notes : '';
        return n ? `${c.name.split(' ').pop()}: ${n}` : null;
      }).filter(Boolean).join(' | ');

      return `<tr>
        <td>${p.num||'—'}</td>
        <td class="bold-cell">${p.first} ${p.last}</td>
        <td>${[p.pos,p.pos2].filter(Boolean).join('/')||'—'}</td><td>${p.age||'—'}</td>
        ${skillCells}
        <td><span class="badge ${pc}">${avg}</span></td>
        ${measCells}
        ${coachCells}
        <td class="notes-cell" title="${notes}">${notes}</td>
      </tr>`;
    }).join('');
  }

  // ── Export ───────────────────────────────────────────────────────────────
  window.exportCSV = function() {
    const rows = [['Tryout #','First','Last','Age Group','Position',
      ...SKILLS.map(s => s+' (avg)'),
      'Overall (weighted)',
      ...MEAS_FIELDS.map(m => m.label+' (avg)'),
      ...coaches.flatMap(c => [c.name+' Overall', ...SKILLS.map(s => c.name+' '+s), ...MEAS_FIELDS.map(m => c.name+' '+m.label)]),
      ...coaches.map(c => c.name+' Notes')
    ]];
    players.forEach(p => {
      rows.push([p.num, p.first, p.last, p.age, p.pos,
        ...SK.map(k => skillAgg(p.id,k) || ''),
        aggAvg(p.id),
        ...MEAS_FIELDS.map(m => {
          const vals = coaches.map(c => scores[p.id]&&scores[p.id][c.id]?parseFloat(scores[p.id][c.id][m.key])||null:null).filter(v=>v);
          return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : '';
        }),
        ...coaches.flatMap(c => [
          coachAvg(p.id,c.id) || '',
          ...SK.map(k => scores[p.id] && scores[p.id][c.id] ? scores[p.id][c.id][k]||'' : ''),
          ...MEAS_FIELDS.map(m => scores[p.id]&&scores[p.id][c.id]?scores[p.id][c.id][m.key]||'':'')
        ]),
        ...coaches.map(c => '"' + ((scores[p.id]&&scores[p.id][c.id]?scores[p.id][c.id].notes:'')||'').replace(/"/g,'""') + '"')
      ]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'tryout_results.csv';
    a.click();
  };

  // ── Tabs ─────────────────────────────────────────────────────────────────
  window.gotoTab = function(t) {
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['roster','eval','results'][i] === t));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    if (t === 'roster')  renderRoster();
    if (t === 'eval')    { document.getElementById('eval-picker').style.display='block'; document.getElementById('eval-form-wrap').style.display='none'; renderEvalPicker(); }
    if (t === 'results') { renderSummary(); renderResults(); }
  };

  window.renderRoster       = renderRoster;
  window.renderEvalPicker   = renderEvalPicker;
  window.renderResults      = renderResults;
  window.renderSummary      = renderSummary;

  // ── Password gate ────────────────────────────────────────────────────────
  const CORRECT_PASSWORD = 'Baseball1!';

  window.checkPassword = function() {
    const val = document.getElementById('pw-input').value;
    if (val === CORRECT_PASSWORD) {
      document.getElementById('screen-password').style.display = 'none';
      loadAll();
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  };

  // ── Boot ─────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    // Show password screen first, hide everything else
    document.getElementById('screen-password').style.display = 'block';
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = 'none';
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  });
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c8102e; --red-d: #a50d25;
    --bg: #ffffff; --bg2: #f7f8fa; --bg3: #f0f2f5;

      --bg: #1a1a1a; --bg2: #252525; --bg3: #2e2e2e;

      --blue-bg:#0d2137;  --blue-txt:#64b5f6;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--txt); min-height: 100vh; }
  #app { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* Save indicator */
  #save-ind { position: fixed; top: 12px; right: 12px; background: #1b5e20; color: #fff; font-size: 12px; padding: 5px 14px; border-radius: 20px; opacity: 0; transition: opacity .3s; z-index: 9999; pointer-events: none; }

  /* Loading */
  #screen-loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--bdr); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Header */
  .hdr { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; border: 0.5px solid var(--bdr); }
  .hdr-l { display: flex; align-items: center; gap: 10px; }
  .hdr-ico { width: 36px; height: 36px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; flex-shrink: 0; }
  .hdr-title { font-size: 16px; font-weight: 600; color: var(--txt); }
  .hdr-sub { font-size: 12px; color: var(--txt2); }
  .hdr-r { display: flex; align-items: center; gap: 8px; }
  .coach-pill { font-size: 12px; padding: 5px 10px; border-radius: 20px; background: var(--bg2); color: var(--txt); display: flex; align-items: center; gap: 6px; border: 0.5px solid var(--bdr); }
  .coach-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }

  /* Tabs */
  .tabs { display: flex; background: var(--bg2); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; border: 0.5px solid var(--bdr); }
  .tab { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--txt2); background: transparent; border: none; transition: all .15s; }
  .tab.active { background: var(--bg); color: var(--txt); }
  .section { display: none; } .section.active { display: block; }

  /* Buttons */
  .btn { padding: 8px 14px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); cursor: pointer; white-space: nowrap; font-weight: 500; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.97); }
  .btn.pri { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.pri:hover { background: var(--red-d); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .btn.del { color: var(--txt3); }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .toolbar input[type=text], .toolbar select { padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); }
  .toolbar input[type=text] { flex: 1; min-width: 140px; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .bgn { background: var(--green-bg); color: var(--green-txt); }
  .bam { background: var(--amber-bg); color: var(--amber-txt); }
  .brd { background: var(--red-bg); color: var(--red-txt); }
  .bbl { background: var(--blue-bg); color: var(--blue-txt); }
  .bgr { background: var(--bg3); color: var(--txt3); }

  /* Player rows */
  .pgrid { display: flex; flex-direction: column; gap: 6px; }
  .prow { display: grid; grid-template-columns: 36px 1fr auto auto auto; gap: 10px; align-items: center; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--bdr); border-radius: var(--radius-sm); }
  .prow:hover { border-color: var(--bdr2); }
  .pnum { font-size: 13px; font-weight: 600; color: var(--txt2); text-align: center; }
  .pname { font-size: 14px; font-weight: 600; color: var(--txt); }
  .pmeta { font-size: 11px; color: var(--txt2); margin-top: 1px; }
  .pbadges { display: flex; flex-direction: column; gap: 3px; }
  .pavg { font-size: 14px; font-weight: 600; color: var(--txt); min-width: 28px; text-align: right; }
  .pactions { display: flex; gap: 4px; }

  /* Add form */
  .add-form { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border: 0.5px solid var(--bdr); }
  .frow { display: grid; gap: 8px; margin-bottom: 8px; }
  .c4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .c3 { grid-template-columns: 1fr 1fr 1fr; }
  .fg label { font-size: 11px; color: var(--txt2); display: block; margin-bottom: 3px; }
  .fg input, .fg select { width: 100%; padding: 7px 9px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); }

  /* Eval card */
  .eval-card { background: var(--bg); border: 0.5px solid var(--bdr); border-radius: var(--radius); padding: 16px; }
  .eval-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 0.5px solid var(--bdr); }
  .eval-pname { font-size: 18px; font-weight: 700; color: var(--txt); }
  .eval-meta { font-size: 12px; color: var(--txt2); margin-top: 3px; }
  .eval-coach-lbl { font-size: 12px; font-weight: 600; margin-top: 6px; }
  .eval-avg-block { text-align: right; }
  .eval-avg-num { font-size: 26px; font-weight: 700; color: var(--txt); }
  .eval-avg-sub { font-size: 11px; color: var(--txt2); }
  .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .skill-item {}
  .slbl { font-size: 12px; color: var(--txt2); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .sval { font-size: 13px; font-weight: 600; color: var(--txt); }
  .strack { display: flex; gap: 5px; flex-wrap: wrap; }
  .sc { width: 44px; height: 44px; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; font-weight: 600; background: var(--bg2); border: 0.5px solid var(--bdr); color: var(--txt2); user-select: none; -webkit-tap-highlight-color: transparent; }
  .sc.on { background: var(--red); border-color: var(--red-d); color: #fff; }
  .sc:active { transform: scale(0.93); }
  .notes-wrap { margin-bottom: 4px; }
  .notes-lbl { font-size: 12px; color: var(--txt2); display: block; margin-bottom: 4px; }
  .notes-ta { width: 100%; padding: 9px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--txt); resize: vertical; min-height: 64px; font-family: inherit; }
  .divider { border: none; border-top: 0.5px solid var(--bdr); margin: 12px 0; }
  .other-title { font-size: 12px; font-weight: 600; color: var(--txt2); margin-bottom: 8px; }
  .other-row { display: flex; gap: 8px; align-items: flex-start; padding: 6px 0; border-bottom: 0.5px solid var(--bdr); flex-wrap: wrap; }
  .other-name { font-size: 12px; font-weight: 600; min-width: 110px; }
  .other-avg { font-weight: 400; color: var(--txt2); }
  .other-pills { display: flex; gap: 4px; flex-wrap: wrap; }
  .cpill { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .eval-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .eval-nav-r { display: flex; gap: 8px; align-items: center; }
  .eval-prog { font-size: 12px; color: var(--txt2); }

  /* Summary stats */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; border: 0.5px solid var(--bdr); }
  .stat-val { font-size: 24px; font-weight: 700; color: var(--txt); }
  .stat-lbl { font-size: 11px; color: var(--txt2); margin-top: 2px; }

  /* Results table */
  .rtable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .rtable th { text-align: left; padding: 8px 8px; font-size: 11px; font-weight: 600; color: var(--txt2); border-bottom: 1px solid var(--bdr); background: var(--bg2); white-space: nowrap; }
  .rtable td { padding: 8px 8px; border-bottom: 0.5px solid var(--bdr); color: var(--txt); vertical-align: middle; }
  .rtable tr:hover td { background: var(--bg2); }
  .spill { padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .per-coach { margin-top: 2px; display: flex; gap: 2px; align-items: center; }
  .bold-cell { font-weight: 600; white-space: nowrap; }
  .notes-cell { max-width: 150px; font-size: 11px; color: var(--txt2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dim { color: var(--txt3) !important; }
  .empty-td { text-align: center; padding: 2rem; color: var(--txt2); }

  /* Login */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 16px; }
  .login-card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--bdr); padding: 24px; width: 100%; max-width: 400px; }

  .new-coach-row { display: flex; gap: 8px; margin-top: 4px; }
  .new-coach-row input { flex: 1; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); }

  .timer-display { font-size: 28px; font-weight: 700; color: var(--txt); text-align: center; letter-spacing: 1px; padding: 8px 0 6px; font-variant-numeric: tabular-nums; }

  .timer-start:hover { background: #2e7d32; }

  .timer-stop:hover  { background: var(--red-d); }
  .timer-reset { background: var(--bg2); color: var(--txt2); border: 0.5px solid var(--bdr2) !important; flex: 0 0 72px; }

  @media (max-width: 600px) { .meas-grid { grid-template-columns: 1fr 1fr; } }
  .mread-list { margin-top:6px;display:flex;flex-direction:column;gap:3px;min-height:20px }
  .mread-row { display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--bdr) }
  .mread-val { font-size:13px;font-weight:600;color:var(--txt) }
  .mread-del { background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:0 2px;line-height:1 }
  .mread-del:hover { color:var(--red) }
  .mread-avg { font-size:11px;font-weight:600;color:var(--txt2);margin-top:4px;text-align:right }
  .kp-btn { padding:14px;font-size:18px;font-weight:600;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--txt);cursor:pointer }
  .kp-btn:hover { background:var(--bg3) }
  .kp-btn:active { transform:scale(0.95) }
  .kp-del { background:var(--bg3);color:var(--txt2) }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .skill-grid { grid-template-columns: 1fr; }
    .frow.c4 { grid-template-columns: 1fr 1fr; }
    .frow.c3 { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .prow { grid-template-columns: 30px 1fr auto auto; }
    .pbadges { display: none; }
    .sc { width: 26px; height: 26px; font-size: 11px; }
  }
</style>
</head>
<body>
<div id="save-ind">✓ Saved</div>

<!-- Edit Player Modal -->

<!-- Keypad Modal -->
<div id="kp-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--bg);border-radius:var(--radius);padding:20px;width:100%;max-width:320px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:14px;font-weight:600;color:var(--txt)" id="kp-title">Enter value</div>
      <button class="btn sm del" onclick="closeKeypad()" style="font-size:16px;padding:2px 8px">✕</button>

    <div id="kp-display" style="font-size:32px;font-weight:700;color:var(--txt);text-align:center;padding:12px 0;border-bottom:0.5px solid var(--bdr);margin-bottom:12px;letter-spacing:1px;min-height:56px">0</div>

      <button class="kp-btn" onclick="kpPress('8')">8</button>
      <button class="kp-btn" onclick="kpPress('9')">9</button>

      <button class="kp-btn" onclick="kpPress('6')">6</button>

      <button class="kp-btn" onclick="kpPress('2')">2</button>
      <button class="kp-btn" onclick="kpPress('3')">3</button>

</div>

<div id="app">

  <!-- Password Gate -->
  <div id="screen-password">
    <div class="login-wrap">
      <div class="login-card" style="max-width:360px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <div class="hdr-ico">⚾</div>

            <div class="login-title">Tryout Evaluator</div>

          </div>
        </div>

          <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:6px">Enter password to continue</label>

            style="width:100%;padding:10px 12px;font-size:15px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt);"

        </div>

        <button class="btn pri" style="width:100%;padding:10px;font-size:15px" onclick="checkPassword()">Enter</button>
      </div>
    </div>
  </div>

  <!-- Loading -->

    <div class="spinner"></div>
    <div id="loading-msg" style="font-size:14px;color:#888">Connecting to database...</div>
  </div>

  <!-- Login -->
  <div id="screen-login" style="display:none">
    <div class="login-wrap">
      <div class="login-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="hdr-ico">⚾</div>

            <div class="login-title">Tryout Evaluator</div>

        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="screen-main" style="display:none">
    <div class="hdr">
      <div class="hdr-l">
        <div class="hdr-ico">⚾</div>
        <div>
          <div class="hdr-title">Tryout Evaluator</div>
          <div class="hdr-sub" id="hdr-sub">Baseball Assessment</div>
        </div>
      </div>
      <div class="hdr-r">
        <div class="coach-pill">
          <div class="coach-dot" id="coach-dot"></div>
          <span id="coach-label">Coach</span>
        </div>
        <button class="btn sm" onclick="switchCoach()">Switch</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="gotoTab('roster')">Roster</button>
      <button class="tab" onclick="gotoTab('eval')">Evaluate</button>
      <button class="tab" onclick="gotoTab('results')">Results</button>
    </div>

    <!-- Roster -->
    <div id="tab-roster" class="section active">
      <div class="toolbar">
        <input type="text" id="r-srch" placeholder="Search by name..." oninput="renderRoster()" style="min-width:120px">
        <select id="r-age" onchange="renderRoster()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="">All ages</option>
        </select>
        <select id="r-sort" onchange="renderRoster()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="name">Sort: Name</option>
          <option value="tryout">Sort: Tryout #</option>
          <option value="age">Sort: Age Group</option>
        </select>
        <button class="btn" onclick="document.getElementById('csv-inp').click()">⬆ Import CSV</button>
        <input type="file" id="csv-inp" accept=".csv" style="display:none" onchange="importCSV(event)">
        <button class="btn" onclick="toggleAddForm()">+ Add player</button>
      </div>
      <div id="add-form" style="display:none" class="add-form">
        <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:10px">
          <div style="flex-shrink:0">
            <div id="add-photo-preview" style="width:72px;height:72px;border-radius:var(--radius);background:var(--bg2);border:0.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;cursor:pointer" onclick="document.getElementById('add-photo-inp').click()">📷</div>
            <input type="file" id="add-photo-inp" accept="image/*" capture="environment" style="display:none" onchange="previewAddPhoto(event)">
            <div style="font-size:10px;color:var(--txt3);text-align:center;margin-top:3px">Tap for photo</div>
          </div>
          <div style="flex:1">
        <div class="frow c4">
          <div class="fg"><label>First name</label><input id="ff" type="text" placeholder="First"></div>
          <div class="fg"><label>Last name</label><input id="fl" type="text" placeholder="Last"></div>
          <div class="fg"><label>Age group</label>
            <select id="fa" style="width:100%;padding:6px 8px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
              <option value="">Select...</option>
              <option>7U</option><option>8U</option><option>9U</option><option>10U</option>
              <option>11U</option><option>12U</option><option>13U</option><option>14U</option>
              <option>15U</option><option>16U</option><option>17U</option><option>18U</option>
            </select>
          </div>
          <div class="fg"><label>Tryout number</label><input id="fg2" type="text" placeholder="e.g. 42"></div>
        </div>
        <div class="frow c4">
          <div class="fg"><label>Primary position</label>
            <select id="fp"><option value="">Select...</option>
              <option>Pitcher</option><option>Catcher</option><option>1B</option><option>2B</option><option>3B</option><option>SS</option><option>LF</option><option>CF</option><option>RF</option><option>Utility</option><option>Unknown</option>
            </select>
          </div>
          <div class="fg"><label>Secondary position</label>
            <select id="fp2"><option value="">Select...</option>
              <option>Pitcher</option><option>Catcher</option><option>1B</option><option>2B</option><option>3B</option><option>SS</option><option>LF</option><option>CF</option><option>RF</option><option>Utility</option><option>Unknown</option>
            </select>
          </div>
        </div>
          </div><!-- end flex:1 -->
        </div><!-- end photo+form row -->
        <div style="display:flex;gap:8px">
          <button class="btn pri" onclick="addPlayer()">Add player</button>
          <button class="btn" onclick="toggleAddForm()">Cancel</button>
        </div>
      </div>
      <div id="roster-list" class="pgrid"></div>
    </div>

    <!-- Evaluate -->
    <div id="tab-eval" class="section">
      <div id="eval-main-layout" style="display:flex;gap:12px;align-items:flex-start">
      <div id="eval-sidebar" style="display:none;width:200px;flex-shrink:0;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--radius);overflow:hidden">
        <div style="padding:10px 12px;font-size:11px;font-weight:600;color:var(--txt2);border-bottom:0.5px solid var(--bdr);text-transform:uppercase;letter-spacing:.5px" id="sidebar-age-label">Players</div>
        <div id="sidebar-list" style="overflow-y:auto;max-height:70vh"></div>
      </div>
      <div style="flex:1;min-width:0">
      <div id="eval-picker">
        <div class="toolbar">
          <input type="text" id="ep-srch" placeholder="Search by name..." oninput="renderEvalPicker()" style="min-width:120px">
          <select id="ep-age" onchange="renderEvalPicker()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
            <option value="">All ages</option>
          </select>
          <select id="ep-sort" onchange="renderEvalPicker()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
            <option value="name">Sort: Name</option>
            <option value="tryout">Sort: Tryout #</option>
            <option value="age">Sort: Age Group</option>
          </select>
          <select id="ep-filter" onchange="renderEvalPicker()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
            <option value="">All players</option>
            <option value="pending">Not scored by me</option>
            <option value="done">Scored by me</option>
          </select>
        </div>
        <div id="eval-list" class="pgrid"></div>
      </div>
      <div id="eval-form-wrap" style="display:none"></div>
      </div><!-- end flex:1 -->
      </div><!-- end eval-main-layout -->
    </div>

    <!-- Results -->
    <div id="tab-results" class="section">
      <div class="stats-row" id="sum-stats"></div>
      <div class="toolbar">
        <input type="text" id="res-srch" placeholder="Filter by name..." oninput="renderResults()" style="min-width:120px">
        <select id="res-age" onchange="renderResults()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="">All ages</option>
        </select>
        <select id="res-pos" onchange="renderResults()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="">All positions</option>
          <option>Pitcher</option><option>Catcher</option><option>1B</option><option>2B</option><option>3B</option><option>SS</option><option>LF</option><option>CF</option><option>RF</option><option>Utility</option>
        </select>
        <select id="res-sort" onchange="renderResults()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="avg">Sort: Avg score</option>
          <option value="name">Sort: Name</option>
          <option value="tryout">Sort: Tryout #</option>
          <option value="age">Sort: Age Group</option>
        </select>
        <button class="btn pri" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
      <div style="overflow-x:auto">
        <table class="rtable">
          <thead id="res-head"></thead>
          <tbody id="res-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>

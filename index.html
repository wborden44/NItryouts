<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tryout Evaluator</title>

<!-- ── REPLACE THIS BLOCK WITH YOUR FIREBASE CONFIG ── -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB5qoFoZy_fbXQngWWYg79mv3twMNJZysE",
    authDomain: "tryout-app-5cdc1.firebaseapp.com",
    projectId: "tryout-app-5cdc1",
    storageBucket: "tryout-app-5cdc1.firebasestorage.app",
    messagingSenderId: "851377690492",
    appId: "1:851377690492:web:da90235338b336e7c536f9"
  };
<!-- ── END FIREBASE CONFIG BLOCK ── -->

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── State ────────────────────────────────────────────────────────────────
  const SKILLS = ['Hitting','Pitching','Fielding','Arm Strength','Speed','Catching','Instincts'];
  const SK     = ['hitting','pitching','fielding','arm','speed','catching','instincts'];
  const PALETTE = ['#c8102e','#1565c0','#2e7d32','#6a1b9a','#e65100','#00695c','#bf360c'];

  let coaches  = [];
  let players  = [];
  let scores   = {};   // scores[pid][cid][skillKey|'notes']
  let activeCoach   = null;
  let currentEvalPid = null;
  let saveTimer = null;
  let unsubscribers = [];

  // ── Firestore helpers ────────────────────────────────────────────────────
  async function loadAll() {
    showLoading(true);
    try {
      // Load coaches
      const cSnap = await getDocs(collection(db, 'coaches'));
      coaches = [];
      cSnap.forEach(d => coaches.push({ id: d.id, ...d.data() }));
      if (!coaches.length) {
        const defaults = [
          { name: 'Coach Rivera',   color: '#c8102e' },
          { name: 'Coach Thompson', color: '#1565c0' },
          { name: 'Coach Davis',    color: '#2e7d32' },
        ];
        for (const c of defaults) {
          const id = 'c' + Date.now() + Math.random().toString(36).slice(-4);
          await setDoc(doc(db, 'coaches', id), c);
          coaches.push({ id, ...c });
        }
      }

      // Load players
      const pSnap = await getDocs(collection(db, 'players'));
      players = [];
      pSnap.forEach(d => players.push({ id: d.id, ...d.data() }));

      // Load scores
      const sSnap = await getDocs(collection(db, 'scores'));
      scores = {};
      sSnap.forEach(d => {
        const [pid, cid] = d.id.split('__');
        if (!scores[pid]) scores[pid] = {};
        scores[pid][cid] = d.data();
      });

      showLoading(false);
      renderLogin();
      startListeners();
    } catch (e) {
      console.error(e);
      document.getElementById('loading-msg').textContent = 'Connection error. Check your Firebase config.';
    }
  }

  function startListeners() {
    // Live scores listener — updates results in real time
    const unsub1 = onSnapshot(collection(db, 'scores'), snap => {
      snap.docChanges().forEach(change => {
        const [pid, cid] = change.doc.id.split('__');
        if (!scores[pid]) scores[pid] = {};
        if (change.type === 'removed') {
          delete scores[pid][cid];
        } else {
          scores[pid][cid] = change.doc.data();
        }
      });
      if (document.getElementById('tab-results').classList.contains('active')) {
        renderSummary(); renderResults();
      }
    });

    // Live players listener
    const unsub2 = onSnapshot(collection(db, 'players'), snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'removed') {
          players = players.filter(p => p.id !== change.doc.id);
        } else {
          const idx = players.findIndex(p => p.id === change.doc.id);
          const data = { id: change.doc.id, ...change.doc.data() };
          if (idx >= 0) players[idx] = data; else players.push(data);
        }
      });
      if (document.getElementById('tab-roster').classList.contains('active')) renderRoster();
      if (document.getElementById('tab-eval').classList.contains('active')) renderEvalPicker();
    });

    // Live coaches listener
    const unsub3 = onSnapshot(collection(db, 'coaches'), snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'removed') {
          coaches = coaches.filter(c => c.id !== change.doc.id);
        } else {
          const idx = coaches.findIndex(c => c.id === change.doc.id);
          const data = { id: change.doc.id, ...change.doc.data() };
          if (idx >= 0) coaches[idx] = data; else coaches.push(data);
        }
      });
    });

    unsubscribers = [unsub1, unsub2, unsub3];
  }

  async function saveScore(pid, cid) {
    const data = scores[pid] && scores[pid][cid] ? { ...scores[pid][cid] } : {};
    await setDoc(doc(db, 'scores', `${pid}__${cid}`), data);
    flashSave();
  }

  function scheduleSave(pid, cid) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => saveScore(pid, cid), 350);
  }

  function flashSave() {
    const el = document.getElementById('save-ind');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 1500);
  }

  function showLoading(on) {
    document.getElementById('screen-loading').style.display = on ? 'flex' : 'none';
    document.getElementById('screen-login').style.display = on ? 'none' : 'block';
  }

  function newId(prefix) {
    return prefix + Date.now().toString(36) + Math.random().toString(36).slice(-4);
  }

  // ── Login ────────────────────────────────────────────────────────────────
  function renderLogin() {
    document.getElementById('screen-login').style.display = 'block';
    document.getElementById('screen-main').style.display = 'none';
    const el = document.getElementById('coach-list');
    if (!coaches.length) { el.innerHTML = '<p class="empty">No coaches yet — add one below.</p>'; return; }
    el.innerHTML = coaches.map(c => {
      const ini = c.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      return `<button class="coach-btn" onclick="loginAs('${c.id}')">
        <div class="cavatar" style="background:${c.color}22;color:${c.color}">${ini}</div>
        <div>
          <div class="coach-btn-name">${c.name}</div>
          <div class="coach-btn-role">Tap to score</div>
        </div>
      </button>`;
    }).join('');
  }

  window.addCoach = async function() {
    const inp = document.getElementById('new-coach-input');
    const name = inp.value.trim(); if (!name) return;
    const id = newId('c');
    const color = PALETTE[coaches.length % PALETTE.length];
    await setDoc(doc(db, 'coaches', id), { name, color });
    coaches.push({ id, name, color });
    inp.value = '';
    renderLogin();
  };

  window.loginAs = function(id) {
    activeCoach = coaches.find(c => c.id === id);
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = 'block';
    document.getElementById('coach-label').textContent = activeCoach.name;
    document.getElementById('coach-dot').style.background = activeCoach.color;
    document.getElementById('hdr-sub').textContent = 'Scoring as ' + activeCoach.name;
    gotoTab('roster');
  };

  window.switchCoach = function() {
    activeCoach = null;
    renderLogin();
  };

  // ── Roster ───────────────────────────────────────────────────────────────
  window.toggleAddForm = function() {
    const f = document.getElementById('add-form');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  };

  window.addPlayer = async function() {
    const first = document.getElementById('ff').value.trim();
    const last  = document.getElementById('fl').value.trim();
    if (!first || !last) { alert('First and last name required'); return; }
    const id = newId('p');
    const data = {
      first, last,
      age:   document.getElementById('fa').value.trim(),
      num:   document.getElementById('fn').value.trim(),
      pos:   document.getElementById('fp').value,
      group: document.getElementById('fg2').value.trim(),
      notes: document.getElementById('fno').value.trim(),
      createdAt: Date.now()
    };
    await setDoc(doc(db, 'players', id), data);
    players.push({ id, ...data });
    ['ff','fl','fa','fn','fg2','fno'].forEach(x => document.getElementById(x).value = '');
    document.getElementById('fp').value = '';
    toggleAddForm();
    renderRoster();
  };

  window.removePlayer = async function(id) {
    if (!confirm('Remove this player and all their scores?')) return;
    await deleteDoc(doc(db, 'players', id));
    // Remove all score docs for this player
    for (const c of coaches) {
      try { await deleteDoc(doc(db, 'scores', `${id}__${c.id}`)); } catch(e){}
    }
    players = players.filter(p => p.id !== id);
    delete scores[id];
    renderRoster();
  };

  window.importCSV = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const lines = ev.target.result.trim().split('\n');
      if (lines.length < 2) { alert('Empty CSV'); return; }
      const hdrs = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
      const get = (row, aliases) => { for (const a of aliases) { const i = hdrs.indexOf(a); if (i >= 0 && row[i]) return row[i].trim(); } return ''; };
      let n = 0;
      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',');
        let first = get(row, ['first','firstname','fname']);
        let last  = get(row, ['last','lastname','lname']);
        const full = get(row, ['name','playername','fullname']);
        if (!first && !last && full) { const p = full.split(' '); first = p[0]; last = p.slice(1).join(' '); }
        if (!first || !last) continue;
        const id = newId('p');
        const data = {
          first, last,
          age:   get(row, ['age','gradyear','grad']),
          num:   get(row, ['number','num','jersey','jerseynumber']),
          pos:   get(row, ['position','pos']),
          group: get(row, ['group','team','division']),
          notes: get(row, ['notes','comments']),
          createdAt: Date.now()
        };
        await setDoc(doc(db, 'players', id), data);
        players.push({ id, ...data });
        n++;
      }
      e.target.value = '';
      renderRoster();
      alert(`Imported ${n} player${n !== 1 ? 's' : ''}.`);
    };
    reader.readAsText(file);
  };

  function renderRoster() {
    const q = (document.getElementById('r-srch').value || '').toLowerCase();
    const el = document.getElementById('roster-list');
    const list = players.filter(p => `${p.first} ${p.last} ${p.num} ${p.pos} ${p.group}`.toLowerCase().includes(q));
    if (!list.length) { el.innerHTML = '<p class="empty">No players yet — import a CSV or add manually.</p>'; return; }
    el.innerHTML = list.map(p => {
      const myScored = activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]);
      const coachCount = coaches.filter(c => scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k])).length;
      return `<div class="prow">
        <div class="pnum">${p.num || '—'}</div>
        <div>
          <div class="pname">${p.first} ${p.last}</div>
          <div class="pmeta">${p.pos || '—'} · ${p.group || '—'}</div>
        </div>
        <div class="pbadges">
          ${myScored ? '<span class="badge bgn">Scored by me</span>' : '<span class="badge bgr">Pending</span>'}
          ${coachCount ? `<span class="badge bbl">${coachCount}/${coaches.length} coaches</span>` : ''}
        </div>
        <div class="pavg">${aggAvg(p.id)}</div>
        <div class="pactions">
          <button class="btn pri sm" onclick="openEval('${p.id}')">Evaluate</button>
          <button class="btn sm del" onclick="removePlayer('${p.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Eval picker ──────────────────────────────────────────────────────────
  function renderEvalPicker() {
    const q      = (document.getElementById('ep-srch').value || '').toLowerCase();
    const filter = document.getElementById('ep-filter').value;
    const el     = document.getElementById('eval-list');
    let list = players.filter(p => `${p.first} ${p.last} ${p.pos}`.toLowerCase().includes(q));
    if (filter === 'pending') list = list.filter(p => !activeCoach || !scores[p.id] || !scores[p.id][activeCoach.id] || !SK.some(k => scores[p.id][activeCoach.id][k]));
    if (filter === 'done')    list = list.filter(p => activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]));
    if (!list.length) { el.innerHTML = '<p class="empty">No players match.</p>'; return; }
    el.innerHTML = list.map(p => {
      const myScored = activeCoach && scores[p.id] && scores[p.id][activeCoach.id] && SK.some(k => scores[p.id][activeCoach.id][k]);
      return `<div class="prow">
        <div class="pnum">${p.num || '—'}</div>
        <div><div class="pname">${p.first} ${p.last}</div><div class="pmeta">${p.pos || '—'}</div></div>
        <div>${myScored ? '<span class="badge bgn">Scored</span>' : '<span class="badge bgr">Pending</span>'}</div>
        <div class="pavg">${aggAvg(p.id)}</div>
        <div><button class="btn pri sm" onclick="openEval('${p.id}')">Score →</button></div>
      </div>`;
    }).join('');
  }

  window.openEval = function(pid) {
    currentEvalPid = pid;
    document.getElementById('eval-picker').style.display = 'none';
    document.getElementById('eval-form-wrap').style.display = 'block';
    renderEvalForm();
  };

  window.closeEval = function() {
    document.getElementById('eval-picker').style.display = 'block';
    document.getElementById('eval-form-wrap').style.display = 'none';
    renderEvalPicker();
  };

  // ── Eval form ────────────────────────────────────────────────────────────
  function renderEvalForm() {
    const p = players.find(x => x.id === currentEvalPid);
    if (!p || !activeCoach) return;
    if (!scores[p.id]) scores[p.id] = {};
    if (!scores[p.id][activeCoach.id]) scores[p.id][activeCoach.id] = {};
    const cs = scores[p.id][activeCoach.id];
    const idx = players.indexOf(p);

    const myAvgVal = () => {
      const v = SK.map(k => cs[k] || 0).filter(v => v > 0);
      return v.length ? (v.reduce((a,b) => a+b,0) / v.length).toFixed(1) : '—';
    };

    const scoreRow = (key, label) => {
      const val = cs[key] || 0;
      const btns = Array.from({length:10}, (_,i) =>
        `<button class="sc${val > i ? ' on' : ''}" onclick="setScore('${p.id}','${key}',${i+1})">${i+1}</button>`
      ).join('');
      return `<div class="skill-item">
        <div class="slbl">${label} <span class="sval" id="sv-${key}">${val ? val+'/10' : '—'}</span></div>
        <div class="strack">${btns}</div>
      </div>`;
    };

    const others = coaches.filter(c => c.id !== activeCoach.id && scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k]));
    const othersHTML = others.length ? `
      <hr class="divider">
      <div class="other-title">Other coaches' scores</div>
      ${others.map(c => {
        const sc = scores[p.id][c.id];
        const cv = SK.map(k => sc[k] || 0).filter(v => v > 0);
        const cavg = cv.length ? (cv.reduce((a,b) => a+b,0)/cv.length).toFixed(1) : '—';
        const pills = SK.map((k,i) => sc[k] ? `<span class="cpill" style="background:${c.color}18;color:${c.color}">${SKILLS[i].split(' ')[0]}: ${sc[k]}</span>` : '').filter(Boolean).join('');
        return `<div class="other-row">
          <span class="other-name" style="color:${c.color}">${c.name} <span class="other-avg">(${cavg})</span></span>
          <div class="other-pills">${pills}</div>
        </div>`;
      }).join('')}` : '';

    document.getElementById('eval-form-wrap').innerHTML = `
      <div class="eval-card">
        <div class="eval-hdr">
          <div>
            <div class="eval-pname">${p.first} ${p.last}</div>
            <div class="eval-meta">#${p.num||'—'} · ${p.pos||'—'} · Age ${p.age||'—'} · ${p.group||'—'}</div>
            <div class="eval-coach-lbl" style="color:${activeCoach.color}">Scoring as ${activeCoach.name}</div>
          </div>
          <div class="eval-avg-block">
            <div class="eval-avg-num" id="my-avg">${myAvgVal()}</div>
            <div class="eval-avg-sub">my avg / 10</div>
            <div class="eval-avg-sub" style="margin-top:2px">all coaches: ${aggAvg(p.id)}</div>
          </div>
        </div>
        <div class="skill-grid">
          ${SK.map((k,i) => scoreRow(k, SKILLS[i])).join('')}
        </div>
        <div class="notes-wrap">
          <label class="notes-lbl">My notes for ${p.first}</label>
          <textarea id="my-notes" class="notes-ta" onchange="saveNotesNow('${p.id}')" onblur="saveNotesNow('${p.id}')" placeholder="Mechanics, attitude, standout moments...">${cs.notes || ''}</textarea>
        </div>
        ${othersHTML}
        <div class="eval-nav">
          <button class="btn" onclick="closeEval()">← Back</button>
          <div class="eval-nav-r">
            <span class="eval-prog">${idx+1} of ${players.length}</span>
            ${idx < players.length-1 ? `<button class="btn pri" onclick="nextPlayer()">Next →</button>` : ''}
          </div>
        </div>
      </div>`;
  }

  window.setScore = function(pid, key, val) {
    if (!activeCoach) return;
    if (!scores[pid]) scores[pid] = {};
    if (!scores[pid][activeCoach.id]) scores[pid][activeCoach.id] = {};
    scores[pid][activeCoach.id][key] = val;

    // Update buttons
    const kidx = SK.indexOf(key);
    const allTracks = document.querySelectorAll('.strack');
    if (allTracks[kidx]) {
      allTracks[kidx].querySelectorAll('.sc').forEach((sc,i) => {
        sc.classList.toggle('on', i < val);
      });
    }
    const svEl = document.getElementById('sv-' + key);
    if (svEl) svEl.textContent = val + '/10';

    // Update my avg
    const cs = scores[pid][activeCoach.id];
    const vals = SK.map(k => cs[k] || 0).filter(v => v > 0);
    const avg = vals.length ? (vals.reduce((a,b) => a+b,0)/vals.length).toFixed(1) : '—';
    const avgEl = document.getElementById('my-avg');
    if (avgEl) avgEl.textContent = avg;

    scheduleSave(pid, activeCoach.id);
  };

  window.saveNotesNow = function(pid) {
    if (!activeCoach) return;
    if (!scores[pid]) scores[pid] = {};
    if (!scores[pid][activeCoach.id]) scores[pid][activeCoach.id] = {};
    const nt = document.getElementById('my-notes');
    if (nt) scores[pid][activeCoach.id].notes = nt.value;
    saveScore(pid, activeCoach.id);
  };

  window.nextPlayer = function() {
    const idx = players.findIndex(x => x.id === currentEvalPid);
    if (idx < players.length-1) { currentEvalPid = players[idx+1].id; renderEvalForm(); }
  };

  // ── Aggregation ──────────────────────────────────────────────────────────
  function aggAvg(pid) {
    const all = [];
    coaches.forEach(c => {
      if (!scores[pid] || !scores[pid][c.id]) return;
      SK.forEach(k => { const v = scores[pid][c.id][k]; if (v) all.push(v); });
    });
    if (!all.length) return '—';
    return (all.reduce((a,b) => a+b,0) / all.length).toFixed(1);
  }

  function skillAgg(pid, key) {
    const vals = coaches.map(c => scores[pid] && scores[pid][c.id] ? scores[pid][c.id][key] : null).filter(v => v);
    if (!vals.length) return null;
    return (vals.reduce((a,b) => a+b,0) / vals.length).toFixed(1);
  }

  function coachAvg(pid, cid) {
    if (!scores[pid] || !scores[pid][cid]) return null;
    const v = SK.map(k => scores[pid][cid][k] || 0).filter(v => v > 0);
    return v.length ? (v.reduce((a,b) => a+b,0)/v.length).toFixed(1) : null;
  }

  // ── Results ──────────────────────────────────────────────────────────────
  function renderSummary() {
    const evaled = players.filter(p => coaches.some(c => scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k]))).length;
    const avgs = players.map(p => parseFloat(aggAvg(p.id)) || 0).filter(v => v > 0);
    const overall = avgs.length ? (avgs.reduce((a,b) => a+b,0)/avgs.length).toFixed(1) : '—';
    const activeC = coaches.filter(c => players.some(p => scores[p.id] && scores[p.id][c.id] && SK.some(k => scores[p.id][c.id][k]))).length;
    document.getElementById('sum-stats').innerHTML = `
      <div class="stat"><div class="stat-val">${players.length}</div><div class="stat-lbl">Total players</div></div>
      <div class="stat"><div class="stat-val">${evaled}</div><div class="stat-lbl">Evaluated</div></div>
      <div class="stat"><div class="stat-val">${activeC}</div><div class="stat-lbl">Coaches active</div></div>
      <div class="stat"><div class="stat-val">${overall}</div><div class="stat-lbl">Overall avg</div></div>`;
  }

  function renderResults() {
    renderSummary();
    const q    = (document.getElementById('res-srch').value || '').toLowerCase();
    const pos  = document.getElementById('res-pos').value;
    const sort = document.getElementById('res-sort').value;
    let list = players.filter(p => `${p.first} ${p.last} ${p.num} ${p.pos}`.toLowerCase().includes(q) && (!pos || p.pos === pos));
    if (sort === 'avg')  list.sort((a,b) => (parseFloat(aggAvg(b.id))||0) - (parseFloat(aggAvg(a.id))||0));
    if (sort === 'name') list.sort((a,b) => `${a.last}${a.first}`.localeCompare(`${b.last}${b.first}`));
    if (sort === 'pos')  list.sort((a,b) => (a.pos||'').localeCompare(b.pos||''));

    document.getElementById('res-head').innerHTML = `<tr>
      <th>#</th><th>Name</th><th>Pos</th><th>Age</th>
      ${SKILLS.map(s => `<th>${s.split(' ')[0]}</th>`).join('')}
      <th>Overall</th>
      ${coaches.map(c => `<th style="color:${c.color}">${c.name.split(' ').pop()}</th>`).join('')}
      <th>Notes</th>
    </tr>`;

    const body = document.getElementById('res-body');
    if (!list.length) { body.innerHTML = '<tr><td colspan="20" class="empty-td">No results.</td></tr>'; return; }

    body.innerHTML = list.map(p => {
      const avg  = aggAvg(p.id);
      const avgN = parseFloat(avg) || 0;
      const pc   = avg === '—' ? 'bgr' : avgN >= 7.5 ? 'bgn' : avgN >= 5 ? 'bam' : 'brd';

      const skillCells = SK.map(key => {
        const agg = skillAgg(p.id, key);
        if (!agg) return '<td class="dim">—</td>';
        const n = parseFloat(agg);
        const bg = n>=7.5?'#e8f5e9':n>=5?'#fff8e1':'#fce4ec';
        const tc = n>=7.5?'#2e7d32':n>=5?'#f57f17':'#c62828';
        const perCoach = coaches.map(c => {
          const v = scores[p.id] && scores[p.id][c.id] ? scores[p.id][c.id][key] : null;
          return v ? `<span style="color:${c.color};font-size:10px">${v}</span>` : null;
        }).filter(Boolean).join('<span style="color:#aaa;font-size:9px">/</span>');
        return `<td>
          <span class="spill" style="background:${bg};color:${tc}">${agg}</span>
          ${coaches.length > 1 ? `<div class="per-coach">${perCoach}</div>` : ''}
        </td>`;
      }).join('');

      const coachCells = coaches.map(c => {
        const v = coachAvg(p.id, c.id);
        return `<td style="font-size:12px;color:${v ? c.color : '#999'};font-weight:${v?'500':'400'}">${v||'—'}</td>`;
      }).join('');

      const notes = coaches.map(c => {
        const n = scores[p.id] && scores[p.id][c.id] ? scores[p.id][c.id].notes : '';
        return n ? `${c.name.split(' ').pop()}: ${n}` : null;
      }).filter(Boolean).join(' | ');

      return `<tr>
        <td>${p.num||'—'}</td>
        <td class="bold-cell">${p.first} ${p.last}</td>
        <td>${p.pos||'—'}</td><td>${p.age||'—'}</td>
        ${skillCells}
        <td><span class="badge ${pc}">${avg}</span></td>
        ${coachCells}
        <td class="notes-cell" title="${notes}">${notes}</td>
      </tr>`;
    }).join('');
  }

  // ── Export ───────────────────────────────────────────────────────────────
  window.exportCSV = function() {
    const rows = [['Jersey #','First','Last','Age','Position','Group',
      ...SKILLS.map(s => s+' (avg)'),
      'Overall Avg',
      ...coaches.flatMap(c => [c.name+' Avg', ...SKILLS.map(s => c.name+' '+s)]),
      ...coaches.map(c => c.name+' Notes')
    ]];
    players.forEach(p => {
      rows.push([p.num, p.first, p.last, p.age, p.pos, p.group,
        ...SK.map(k => skillAgg(p.id,k) || ''),
        aggAvg(p.id),
        ...coaches.flatMap(c => [
          coachAvg(p.id,c.id) || '',
          ...SK.map(k => scores[p.id] && scores[p.id][c.id] ? scores[p.id][c.id][k]||'' : '')
        ]),
        ...coaches.map(c => '"' + ((scores[p.id]&&scores[p.id][c.id]?scores[p.id][c.id].notes:'')||'').replace(/"/g,'""') + '"')
      ]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'tryout_results.csv';
    a.click();
  };

  // ── Tabs ─────────────────────────────────────────────────────────────────
  window.gotoTab = function(t) {
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['roster','eval','results'][i] === t));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    if (t === 'roster')  renderRoster();
    if (t === 'eval')    { document.getElementById('eval-picker').style.display='block'; document.getElementById('eval-form-wrap').style.display='none'; renderEvalPicker(); }
    if (t === 'results') { renderSummary(); renderResults(); }
  };

  window.renderRoster       = renderRoster;
  window.renderEvalPicker   = renderEvalPicker;
  window.renderResults      = renderResults;
  window.renderSummary      = renderSummary;

  // ── Boot ─────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', loadAll);
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c8102e; --red-d: #a50d25;
    --bg: #ffffff; --bg2: #f7f8fa; --bg3: #f0f2f5;
    --txt: #111; --txt2: #666; --txt3: #999;
    --bdr: rgba(0,0,0,0.10); --bdr2: rgba(0,0,0,0.18);
    --radius: 10px; --radius-sm: 7px;
    --green-bg:#e8f5e9; --green-txt:#2e7d32;
    --amber-bg:#fff8e1; --amber-txt:#f57f17;
    --red-bg:#fce4ec;   --red-txt:#c62828;
    --blue-bg:#e3f2fd;  --blue-txt:#1565c0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --bg2: #252525; --bg3: #2e2e2e;
      --txt: #f0f0f0; --txt2: #aaa; --txt3: #777;
      --bdr: rgba(255,255,255,0.10); --bdr2: rgba(255,255,255,0.20);
      --green-bg:#1b3a1f; --green-txt:#81c784;
      --amber-bg:#3a2e00; --amber-txt:#ffd54f;
      --red-bg:#3a0e1a;   --red-txt:#f48fb1;
      --blue-bg:#0d2137;  --blue-txt:#64b5f6;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--txt); min-height: 100vh; }
  #app { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* Save indicator */
  #save-ind { position: fixed; top: 12px; right: 12px; background: #1b5e20; color: #fff; font-size: 12px; padding: 5px 14px; border-radius: 20px; opacity: 0; transition: opacity .3s; z-index: 9999; pointer-events: none; }

  /* Loading */
  #screen-loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--bdr); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Header */
  .hdr { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; border: 0.5px solid var(--bdr); }
  .hdr-l { display: flex; align-items: center; gap: 10px; }
  .hdr-ico { width: 36px; height: 36px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; flex-shrink: 0; }
  .hdr-title { font-size: 16px; font-weight: 600; color: var(--txt); }
  .hdr-sub { font-size: 12px; color: var(--txt2); }
  .hdr-r { display: flex; align-items: center; gap: 8px; }
  .coach-pill { font-size: 12px; padding: 5px 10px; border-radius: 20px; background: var(--bg2); color: var(--txt); display: flex; align-items: center; gap: 6px; border: 0.5px solid var(--bdr); }
  .coach-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }

  /* Tabs */
  .tabs { display: flex; background: var(--bg2); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; border: 0.5px solid var(--bdr); }
  .tab { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--txt2); background: transparent; border: none; transition: all .15s; }
  .tab.active { background: var(--bg); color: var(--txt); }
  .section { display: none; } .section.active { display: block; }

  /* Buttons */
  .btn { padding: 8px 14px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); cursor: pointer; white-space: nowrap; font-weight: 500; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.97); }
  .btn.pri { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.pri:hover { background: var(--red-d); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .btn.del { color: var(--txt3); }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .toolbar input[type=text], .toolbar select { padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); }
  .toolbar input[type=text] { flex: 1; min-width: 140px; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .bgn { background: var(--green-bg); color: var(--green-txt); }
  .bam { background: var(--amber-bg); color: var(--amber-txt); }
  .brd { background: var(--red-bg); color: var(--red-txt); }
  .bbl { background: var(--blue-bg); color: var(--blue-txt); }
  .bgr { background: var(--bg3); color: var(--txt3); }

  /* Player rows */
  .pgrid { display: flex; flex-direction: column; gap: 6px; }
  .prow { display: grid; grid-template-columns: 36px 1fr auto auto auto; gap: 10px; align-items: center; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--bdr); border-radius: var(--radius-sm); }
  .prow:hover { border-color: var(--bdr2); }
  .pnum { font-size: 13px; font-weight: 600; color: var(--txt2); text-align: center; }
  .pname { font-size: 14px; font-weight: 600; color: var(--txt); }
  .pmeta { font-size: 11px; color: var(--txt2); margin-top: 1px; }
  .pbadges { display: flex; flex-direction: column; gap: 3px; }
  .pavg { font-size: 14px; font-weight: 600; color: var(--txt); min-width: 28px; text-align: right; }
  .pactions { display: flex; gap: 4px; }

  /* Add form */
  .add-form { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border: 0.5px solid var(--bdr); }
  .frow { display: grid; gap: 8px; margin-bottom: 8px; }
  .c4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .c3 { grid-template-columns: 1fr 1fr 1fr; }
  .fg label { font-size: 11px; color: var(--txt2); display: block; margin-bottom: 3px; }
  .fg input, .fg select { width: 100%; padding: 7px 9px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); }

  /* Eval card */
  .eval-card { background: var(--bg); border: 0.5px solid var(--bdr); border-radius: var(--radius); padding: 16px; }
  .eval-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 0.5px solid var(--bdr); }
  .eval-pname { font-size: 18px; font-weight: 700; color: var(--txt); }
  .eval-meta { font-size: 12px; color: var(--txt2); margin-top: 3px; }
  .eval-coach-lbl { font-size: 12px; font-weight: 600; margin-top: 6px; }
  .eval-avg-block { text-align: right; }
  .eval-avg-num { font-size: 26px; font-weight: 700; color: var(--txt); }
  .eval-avg-sub { font-size: 11px; color: var(--txt2); }
  .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .skill-item {}
  .slbl { font-size: 12px; color: var(--txt2); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .sval { font-size: 13px; font-weight: 600; color: var(--txt); }
  .strack { display: flex; gap: 3px; flex-wrap: wrap; }
  .sc { width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: 600; background: var(--bg2); border: 0.5px solid var(--bdr); color: var(--txt2); user-select: none; -webkit-tap-highlight-color: transparent; }
  .sc.on { background: var(--red); border-color: var(--red-d); color: #fff; }
  .sc:active { transform: scale(0.93); }
  .notes-wrap { margin-bottom: 4px; }
  .notes-lbl { font-size: 12px; color: var(--txt2); display: block; margin-bottom: 4px; }
  .notes-ta { width: 100%; padding: 9px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--txt); resize: vertical; min-height: 64px; font-family: inherit; }
  .divider { border: none; border-top: 0.5px solid var(--bdr); margin: 12px 0; }
  .other-title { font-size: 12px; font-weight: 600; color: var(--txt2); margin-bottom: 8px; }
  .other-row { display: flex; gap: 8px; align-items: flex-start; padding: 6px 0; border-bottom: 0.5px solid var(--bdr); flex-wrap: wrap; }
  .other-name { font-size: 12px; font-weight: 600; min-width: 110px; }
  .other-avg { font-weight: 400; color: var(--txt2); }
  .other-pills { display: flex; gap: 4px; flex-wrap: wrap; }
  .cpill { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .eval-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .eval-nav-r { display: flex; gap: 8px; align-items: center; }
  .eval-prog { font-size: 12px; color: var(--txt2); }

  /* Summary stats */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; border: 0.5px solid var(--bdr); }
  .stat-val { font-size: 24px; font-weight: 700; color: var(--txt); }
  .stat-lbl { font-size: 11px; color: var(--txt2); margin-top: 2px; }

  /* Results table */
  .rtable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .rtable th { text-align: left; padding: 8px 8px; font-size: 11px; font-weight: 600; color: var(--txt2); border-bottom: 1px solid var(--bdr); background: var(--bg2); white-space: nowrap; }
  .rtable td { padding: 8px 8px; border-bottom: 0.5px solid var(--bdr); color: var(--txt); vertical-align: middle; }
  .rtable tr:hover td { background: var(--bg2); }
  .spill { padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .per-coach { margin-top: 2px; display: flex; gap: 2px; align-items: center; }
  .bold-cell { font-weight: 600; white-space: nowrap; }
  .notes-cell { max-width: 150px; font-size: 11px; color: var(--txt2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dim { color: var(--txt3) !important; }
  .empty-td { text-align: center; padding: 2rem; color: var(--txt2); }

  /* Login */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 16px; }
  .login-card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--bdr); padding: 24px; width: 100%; max-width: 400px; }
  .login-title { font-size: 20px; font-weight: 700; color: var(--txt); margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--txt2); margin-bottom: 16px; }
  .coach-btn { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; text-align: left; width: 100%; margin-bottom: 8px; }
  .coach-btn:hover { background: var(--bg2); }
  .coach-btn:active { transform: scale(0.98); }
  .cavatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .coach-btn-name { font-size: 15px; font-weight: 600; color: var(--txt); }
  .coach-btn-role { font-size: 11px; color: var(--txt2); }
  .new-coach-row { display: flex; gap: 8px; margin-top: 4px; }
  .new-coach-row input { flex: 1; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--bdr2); border-radius: var(--radius-sm); background: var(--bg); color: var(--txt); }

  .empty { text-align: center; padding: 2rem; color: var(--txt2); font-size: 14px; }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .skill-grid { grid-template-columns: 1fr; }
    .frow.c4 { grid-template-columns: 1fr 1fr; }
    .frow.c3 { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .prow { grid-template-columns: 30px 1fr auto auto; }
    .pbadges { display: none; }
    .sc { width: 26px; height: 26px; font-size: 11px; }
  }
</style>
</head>
<body>
<div id="save-ind">✓ Saved</div>
<div id="app">

  <!-- Loading -->
  <div id="screen-loading">
    <div class="spinner"></div>
    <div id="loading-msg" style="font-size:14px;color:#888">Connecting to database...</div>
  </div>

  <!-- Login -->
  <div id="screen-login" style="display:none">
    <div class="login-wrap">
      <div class="login-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="hdr-ico">⚾</div>
          <div>
            <div class="login-title">Tryout Evaluator</div>
            <div class="login-sub">Select your coach profile to begin</div>
          </div>
        </div>
        <hr style="border:none;border-top:0.5px solid var(--bdr);margin-bottom:16px">
        <div id="coach-list"></div>
        <div class="new-coach-row">
          <input type="text" id="new-coach-input" placeholder="Add new coach name...">
          <button class="btn pri" onclick="addCoach()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="screen-main" style="display:none">
    <div class="hdr">
      <div class="hdr-l">
        <div class="hdr-ico">⚾</div>
        <div>
          <div class="hdr-title">Tryout Evaluator</div>
          <div class="hdr-sub" id="hdr-sub">Baseball Assessment</div>
        </div>
      </div>
      <div class="hdr-r">
        <div class="coach-pill">
          <div class="coach-dot" id="coach-dot"></div>
          <span id="coach-label">Coach</span>
        </div>
        <button class="btn sm" onclick="switchCoach()">Switch</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="gotoTab('roster')">Roster</button>
      <button class="tab" onclick="gotoTab('eval')">Evaluate</button>
      <button class="tab" onclick="gotoTab('results')">Results</button>
    </div>

    <!-- Roster -->
    <div id="tab-roster" class="section active">
      <div class="toolbar">
        <input type="text" id="r-srch" placeholder="Search players..." oninput="renderRoster()">
        <button class="btn" onclick="document.getElementById('csv-inp').click()">⬆ Import CSV</button>
        <input type="file" id="csv-inp" accept=".csv" style="display:none" onchange="importCSV(event)">
        <button class="btn" onclick="toggleAddForm()">+ Add player</button>
      </div>
      <div id="add-form" style="display:none" class="add-form">
        <div class="frow c4">
          <div class="fg"><label>First name</label><input id="ff" type="text" placeholder="First"></div>
          <div class="fg"><label>Last name</label><input id="fl" type="text" placeholder="Last"></div>
          <div class="fg"><label>Age</label><input id="fa" type="text" placeholder="14"></div>
          <div class="fg"><label>Jersey #</label><input id="fn" type="text" placeholder="22"></div>
        </div>
        <div class="frow c3">
          <div class="fg"><label>Position</label>
            <select id="fp"><option value="">Select...</option>
              <option>Pitcher</option><option>Catcher</option><option>1B</option><option>2B</option><option>3B</option><option>SS</option><option>LF</option><option>CF</option><option>RF</option><option>Utility</option><option>Unknown</option>
            </select>
          </div>
          <div class="fg"><label>Group / Division</label><input id="fg2" type="text" placeholder="Group A"></div>
          <div class="fg"><label>Notes</label><input id="fno" type="text" placeholder="Optional"></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn pri" onclick="addPlayer()">Add player</button>
          <button class="btn" onclick="toggleAddForm()">Cancel</button>
        </div>
      </div>
      <div id="roster-list" class="pgrid"></div>
    </div>

    <!-- Evaluate -->
    <div id="tab-eval" class="section">
      <div id="eval-picker">
        <div class="toolbar">
          <input type="text" id="ep-srch" placeholder="Search player to evaluate..." oninput="renderEvalPicker()">
          <select id="ep-filter" onchange="renderEvalPicker()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
            <option value="">All players</option>
            <option value="pending">Not scored by me</option>
            <option value="done">Scored by me</option>
          </select>
        </div>
        <div id="eval-list" class="pgrid"></div>
      </div>
      <div id="eval-form-wrap" style="display:none"></div>
    </div>

    <!-- Results -->
    <div id="tab-results" class="section">
      <div class="stats-row" id="sum-stats"></div>
      <div class="toolbar">
        <input type="text" id="res-srch" placeholder="Filter by name..." oninput="renderResults()">
        <select id="res-pos" onchange="renderResults()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="">All positions</option>
          <option>Pitcher</option><option>Catcher</option><option>1B</option><option>2B</option><option>3B</option><option>SS</option><option>LF</option><option>CF</option><option>RF</option><option>Utility</option>
        </select>
        <select id="res-sort" onchange="renderResults()" style="padding:8px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt)">
          <option value="avg">Sort: Avg score</option>
          <option value="name">Sort: Name</option>
          <option value="pos">Sort: Position</option>
        </select>
        <button class="btn pri" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
      <div style="overflow-x:auto">
        <table class="rtable">
          <thead id="res-head"></thead>
          <tbody id="res-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
